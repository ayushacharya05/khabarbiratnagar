<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>खबर बिराटनगर | Khabar Biratnagar</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#a33e36">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ayushacharya05/khabarbiratnagar/refs/heads/main/images/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <style>
    :root {
      --red: #a33e36;
      --red-dark: #7d2f28;
      --navy: #1a324b;
      --green-deep: #446f55;
      --green-light: #a6c08a;
      --surface: #f5f2ee;
      --card: #ffffff;
      --text: #1a324b;
      --muted: #7a8a9a;
      --border: #e5e0d8;
      --dark-bg: #0e1117;
      --dark-card: #181e27;
      --dark-border: #2a3240;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .app-header {
      position: sticky; top: 0; z-index: 1040;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .header-stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--red) 60%, var(--green-deep) 100%);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0 20px;
      display: flex; align-items: stretch;
      height: 64px;
    }
    .brand-area {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; flex: 0 0 auto;
      padding-right: 28px;
      border-right: 1px solid var(--border);
    }
    .brand-emblem {
      width: 36px; height: 36px;
      background: var(--red);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-emblem span {
      font-family: 'Mukta', sans-serif;
      font-weight: 800; font-size: 1.1rem;
      color: #fff;
    }
    .brand-text { display: flex; flex-direction: column; line-height: 1; }
    .brand-name {
      font-family: 'Mukta', sans-serif;
      font-weight: 800; font-size: 1.25rem;
      color: var(--red); letter-spacing: -0.02em;
    }
    .brand-sub {
      font-size: 0.65rem; font-weight: 500;
      color: var(--muted); letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .header-date {
      display: flex; align-items: center;
      padding: 0 20px;
      font-size: 0.78rem; color: var(--muted);
      font-weight: 500; letter-spacing: 0.04em;
      border-right: 1px solid var(--border);
      white-space: nowrap;
    }
    .header-actions {
      display: flex; align-items: center;
      gap: 6px; margin-left: auto;
    }
    .icon-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border); border-radius: 8px;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); font-size: 0.95rem;
      transition: all 0.2s;
    }
    .icon-btn:hover { background: var(--surface); border-color: var(--red); color: var(--red); }

    /* ── TICKER ── */
    .ticker-bar {
      background: var(--navy);
      color: #fff; overflow: hidden;
      height: 36px; display: flex; align-items: center;
    }
    .ticker-label {
      background: var(--red);
      padding: 0 16px; height: 100%;
      display: flex; align-items: center;
      font-family: 'Mukta', sans-serif;
      font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      white-space: nowrap; flex-shrink: 0;
    }
    .ticker-track { flex: 1; overflow: hidden; position: relative; }
    .ticker-inner {
      display: flex; gap: 60px;
      animation: ticker 30s linear infinite;
      white-space: nowrap; padding-left: 40px;
    }
    .ticker-inner span { font-size: 0.82rem; opacity: 0.9; font-weight: 500; }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ── NAV CATEGORIES ── */
    .cat-nav {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 68px; z-index: 1030;
    }
    .cat-nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 20px;
      display: flex; align-items: center; overflow-x: auto;
      scrollbar-width: none; gap: 0;
    }
    .cat-nav-inner::-webkit-scrollbar { display: none; }
    .cat-link {
      padding: 14px 20px; font-size: 0.85rem; font-weight: 600;
      color: var(--muted); cursor: pointer; white-space: nowrap;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.06em;
      background: none; border: none;
    }
    .cat-link:hover { color: var(--text); }
    .cat-link.active { color: var(--red); border-bottom-color: var(--red); }

    /* ── MAIN LAYOUT ── */
    .main-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 60px; }

    /* ── HERO SECTION ── */
    .hero-section { margin-bottom: 40px; }
    .section-label {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--red); margin-bottom: 16px;
    }
    .section-label::after {
      content: ''; display: block; width: 40px; height: 2px;
      background: var(--green-light);
    }
    .hero-grid { display: grid; grid-template-columns: 1fr 360px; gap: 2px; border-radius: 12px; overflow: hidden; }
    .hero-main { position: relative; cursor: pointer; min-height: 420px; background: #e8e4de; }
    .hero-main img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease; }
    .hero-main:hover img { transform: scale(1.03); }
    .hero-main-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent 0%, rgba(10,15,25,0.92) 100%);
      padding: 40px 28px 28px;
    }
    .hero-category-tag {
      display: inline-block; background: var(--red);
      color: #fff; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 3px; margin-bottom: 10px;
    }
    .hero-title {
      font-family: 'Mukta', sans-serif;
      font-weight: 800; font-size: 1.6rem;
      color: #fff; line-height: 1.3;
    }
    .hero-meta { margin-top: 10px; font-size: 0.78rem; color: rgba(255,255,255,0.6); }
        
    .hero-side { display: flex; flex-direction: column; gap: 2px; }
    .hero-side-item { position: relative; cursor: pointer; flex: 1; min-height: 136px; overflow: hidden; background: #e8e4de; }
    .hero-side-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .hero-side-item:hover img { transform: scale(1.05); }
    .hero-side-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent 0%, rgba(10,15,25,0.88) 100%);
      padding: 24px 16px 14px;
    }
    .hero-side-title {
      font-family: 'Mukta', sans-serif;
      font-weight: 700; font-size: 0.9rem;
      color: #fff; line-height: 1.35;
    }

    /* ── NEWS GRID ── */
    #newsContainer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .news-card {
      background: var(--card);
      border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border);
      display: flex; flex-direction: column;
      cursor: pointer; transition: box-shadow 0.25s, transform 0.25s;
    }
    .news-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(26,50,75,0.12); }
        
    .card-img-wrap { height: 185px; overflow: hidden; background: #e8e4de; position: relative; flex-shrink: 0; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .news-card:hover .card-img-wrap img { transform: scale(1.06); }
    .card-topic-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(10,15,25,0.7); backdrop-filter: blur(4px);
      color: #fff; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 4px;
    }

    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .news-title {
      font-family: 'Mukta', sans-serif;
      font-weight: 700; font-size: 1.05rem;
      color: var(--text); line-height: 1.45;
      flex: 1;
    }
    .card-footer-inner {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .card-date { font-size: 0.72rem; color: var(--muted); font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .card-date::before {
      content: ''; width: 8px; height: 2px;
      background: var(--green-deep); display: block;
    }
    .save-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.9rem; padding: 2px 4px;
      transition: color 0.2s, transform 0.15s;
    }
    .save-btn:hover { transform: scale(1.2); color: var(--red); }
    .save-btn.saved { color: var(--red); }

    /* ── LOADER ── */
    .loader-wrap {
      grid-column: 1/-1; display: flex; justify-content: center;
      align-items: center; padding: 80px 0;
    }
    .loader {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── READER OVERLAY ── */
    #newsReader {
      position: fixed; inset: 0;
      z-index: 2000; display: none;
      background: rgba(10,15,25,0.75);
      backdrop-filter: blur(8px);
    }
    .reader-panel {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 95%; max-width: 720px;
      max-height: 92vh;
      background: #fff; overflow-y: auto;
      border-radius: 14px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
      animation: slideIn 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes slideIn { from { transform: translate(-50%, -46%); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }
        
    .reader-top-stripe { height: 4px; background: linear-gradient(90deg, var(--red) 0%, var(--green-deep) 100%); }
    .reader-header {
      position: sticky; top: 0; background: #fff;
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .reader-back {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; color: var(--text);
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border); transition: all 0.2s;
    }
    .reader-back:hover { background: var(--surface); border-color: var(--red); color: var(--red); }
    .reader-content { padding: 32px; }
    .reader-category {
      display: inline-block; color: var(--red);
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    #rTitle {
      font-family: 'Mukta', sans-serif; font-weight: 800;
      font-size: 1.75rem; line-height: 1.35; color: var(--text);
      margin-bottom: 20px;
    }
    #rImg { width: 100%; border-radius: 10px; margin-bottom: 24px; display: block; background: #eee; }
    #rBody {
      font-family: 'Mukta', sans-serif; font-size: 1.1rem;
      line-height: 1.9; color: #2d3e50;
    }

    /* ── DARK MODE ── */
    body.dark-mode { background: var(--dark-bg); color: #c9d5e0; }
    .dark-mode .app-header, .dark-mode .cat-nav, .dark-mode .reader-header { background: var(--dark-card); border-color: var(--dark-border); }
    .dark-mode .reader-panel { background: var(--dark-card); }
    .dark-mode .news-card { background: var(--dark-card); border-color: var(--dark-border); }
    .dark-mode .news-title, .dark-mode #rTitle { color: #dde8f0; }
    .dark-mode #rBody { color: #a8bcc8; }
    .dark-mode .icon-btn, .dark-mode .reader-back { color: #c9d5e0; border-color: var(--dark-border); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr; }
      .hero-side { flex-direction: row; }
      #newsContainer { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .header-date { display: none; }
      #newsContainer { grid-template-columns: 1fr; }
      .hero-side { flex-direction: column; }
    }
  </style>
</head>
<body onload="initApp()">

  <header class="app-header">
    <div class="header-stripe"></div>
    <div class="header-inner">
      <a href="#" class="brand-area" onclick="location.reload(); return false;">
        <div class="brand-emblem"><span>ख</span></div>
        <div class="brand-text">
          <span class="brand-name">खबर बिराटनगर</span>
          <span class="brand-sub">Khabar Biratnagar</span>
        </div>
      </a>
      <div class="header-date" id="headerDate"></div>
      <div class="header-actions">
        <button class="icon-btn" title="Saved" onclick="renderSaved()"><i class="fas fa-heart"></i></button>
        <button class="icon-btn" onclick="toggleDarkMode()" title="Dark mode"><i id="darkModeIcon" class="fas fa-moon"></i></button>
      </div>
    </div>
  </header>

  <div class="ticker-bar">
    <div class="ticker-label">ताजा</div>
    <div class="ticker-track">
      <div class="ticker-inner" id="tickerInner">
        <span>समाचार लोड हुँदैछ...</span>
      </div>
    </div>
  </div>

  <nav class="cat-nav">
    <div class="cat-nav-inner">
      <button class="cat-link active" onclick="filterByTopic('All', this)">सबै खबर</button>
      <button class="cat-link" onclick="filterByTopic('Politics', this)">राजनीति</button>
      <button class="cat-link" onclick="filterByTopic('Sports', this)">खेलकुद</button>
      <button class="cat-link" onclick="filterByTopic('Tech', this)">प्रविधि</button>
      <button class="cat-link" onclick="filterByTopic('Economy', this)">अर्थतन्त्र</button>
    </div>
  </nav>

  <main class="main-wrap">
    <section class="hero-section" id="heroSection" style="display:none">
      <div class="section-label">शीर्ष समाचार</div>
      <div class="hero-grid" id="heroGrid"></div>
    </section>

    <div id="newsContainer">
      <div class="loader-wrap"><div class="loader"></div></div>
    </div>
  </main>

  <div id="newsReader" onclick="handleReaderBgClick(event)">
    <div class="reader-panel" id="readerPanel">
      <div class="reader-top-stripe"></div>
      <div class="reader-header">
        <button class="reader-back" onclick="closeReader()">
          <i class="fas fa-arrow-left"></i> फर्कनुहोस्
        </button>
        <button id="readerSaveBtn" class="icon-btn" onclick="toggleSaveCurrent()">
          <i class="far fa-heart"></i>
        </button>
      </div>
      <div class="reader-content">
        <div class="reader-category" id="rCategory"></div>
        <h1 id="rTitle"></h1>
        <img id="rImg" src="" alt="">
        <div id="rBody"></div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const fallbackImage = "https://raw.githubusercontent.com/ayushacharya05/khabarbiratnagar/refs/heads/main/images/icon.png";
    const feeds = [
      { url: "https://www.onlinekhabar.com/feed" },
      { url: "https://setopati.com/feed" },
      { url: "https://www.ratopati.com/feed" },
      { url: "https://ekantipur.com/rss/news" },
      { url: "https://www.techpana.com/feed" }
    ];
    let allNews = [], activeList = [], currentOpenItem = null;

    // Initialize App
    async function initApp() {
        // Set date
        const now = new Date();
        document.getElementById('headerDate').textContent = now.toLocaleDateString('ne-NP', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
        
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        await loadNews();
    }

    // Improved Image Scraper
    function getImg(item) {
        // 1. Direct thumbnail
        if (item.thumbnail && typeof item.thumbnail === 'string' && item.thumbnail.includes('http')) return item.thumbnail;
        
        // 2. Enclosure (common for OnlineKhabar)
        if (item.enclosure && item.enclosure.link) return item.enclosure.link;
        
        // 3. Regex for embedded images (common for Ekantipur/Setopati)
        const content = (item.description || '') + (item.content || '');
        const match = content.match(/<img[^>]+src="([^">]+)"/);
        return (match && match[1]) ? match[1] : fallbackImage;
    }

    async function loadNews() {
      try {
        const results = await Promise.all(feeds.map(f =>
          fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f.url)}`)
          .then(r => r.json())
          .then(data => (data.items || []).map(item => ({ 
              ...item, 
              topic: getTopic(item.title + (item.description || '')),
              image: getImg(item) // Pre-calculate image
          })))
          .catch(() => [])
        ));
        allNews = results.flat().sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
        activeList = allNews;
        updateTicker(allNews.slice(0, 8));
        renderHero(allNews.slice(0, 4));
        renderList(allNews.slice(4));
      } catch(e) {
        document.getElementById('newsContainer').innerHTML = '<div class="empty-state"><i class="fas fa-satellite-dish"></i><p>समाचार लोड गर्न सकिएन।</p></div>';
      }
    }

    function updateTicker(items) {
      const ti = document.getElementById('tickerInner');
      ti.innerHTML = [...items, ...items].map(i => `<span>${i.title}</span>`).join('');
    }

    function renderHero(items) {
      if (!items.length) return;
      const grid = document.getElementById('heroGrid');
      const main = items[0];
      const sides = items.slice(1, 4);
      grid.innerHTML = `
        <div class="hero-main" onclick="openItemFull(activeList[0])">
          <img src="${main.image}" onerror="this.src='${fallbackImage}'" alt="">
          <div class="hero-main-overlay">
            <div class="hero-category-tag">${topicLabel(main.topic)}</div>
            <div class="hero-title">${main.title}</div>
            <div class="hero-meta">${new Date(main.pubDate).toLocaleDateString('ne-NP')}</div>
          </div>
        </div>
        <div class="hero-side">
          ${sides.map((s, i) => `
            <div class="hero-side-item" onclick="openItemFull(activeList[${i+1}])">
              <img src="${s.image}" onerror="this.src='${fallbackImage}'" alt="">
              <div class="hero-side-overlay">
                <div class="hero-side-title">${s.title}</div>
              </div>
            </div>
          `).join('')}
        </div>`;
      document.getElementById('heroSection').style.display = '';
    }

    function renderList(list) {
      const container = document.getElementById('newsContainer');
      container.innerHTML = '';
      const saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
      if (!list.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><p>कुनै समाचार फेला परेन।</p></div>';
        return;
      }
      list.forEach((item) => {
        const isSaved = saved.some(s => s.link === item.link);
        const div = document.createElement('div');
        div.className = 'news-card';
        div.innerHTML = `
          <div class="card-img-wrap" onclick="openItemFullByLink('${item.link}')">
            <img src="${item.image}" loading="lazy" onerror="this.src='${fallbackImage}'" alt="">
            <span class="card-topic-badge">${topicLabel(item.topic)}</span>
          </div>
          <div class="card-body" onclick="openItemFullByLink('${item.link}')">
            <div class="news-title">${item.title}</div>
          </div>
          <div style="padding:0 16px 14px">
            <div class="card-footer-inner">
              <span class="card-date">${new Date(item.pubDate).toLocaleDateString('ne-NP')}</span>
              <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleSaveItem('${item.link}', this)">
                <i class="${isSaved ? 'fas' : 'far'} fa-heart"></i>
              </button>
            </div>
          </div>`;
        container.appendChild(div);
      });
    }

    function openItemFullByLink(link) {
        const item = allNews.find(n => n.link === link) || activeList.find(n => n.link === link);
        openItemFull(item);
    }

    function openItemFull(item) {
      if (!item) return;
      currentOpenItem = item;
      const saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
      const isSaved = saved.some(s => s.link === item.link);
      
      document.getElementById('rCategory').textContent = topicLabel(item.topic);
      document.getElementById('rTitle').textContent = item.title;
      document.getElementById('rBody').innerHTML = item.content || item.description || '';
      
      const rImg = document.getElementById('rImg');
      rImg.src = item.image;
      rImg.onerror = () => rImg.src = fallbackImage;
      
      document.getElementById('readerSaveBtn').innerHTML = `<i class="${isSaved ? 'fas' : 'far'} fa-heart"></i>`;
      document.getElementById('newsReader').style.display = 'block';
      document.body.style.overflow = 'hidden';
      document.getElementById('readerPanel').scrollTop = 0;
    }

    function closeReader() {
      document.getElementById('newsReader').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    function handleReaderBgClick(e) { if (e.target.id === 'newsReader') closeReader(); }

    function toggleSaveItem(link, btn) {
      event.stopPropagation();
      let saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
      const idx = saved.findIndex(s => s.link === link);
      if (idx > -1) { 
          saved.splice(idx, 1); 
          btn.classList.remove('saved');
          btn.innerHTML = '<i class="far fa-heart"></i>'; 
      } else { 
          const item = allNews.find(n => n.link === link); 
          if (item) saved.push(item); 
          btn.classList.add('saved');
          btn.innerHTML = '<i class="fas fa-heart"></i>'; 
      }
      localStorage.setItem('savedNews', JSON.stringify(saved));
    }

    function toggleSaveCurrent() {
      const btn = document.querySelector(`.save-btn[onclick*="${currentOpenItem.link}"]`);
      toggleSaveItem(currentOpenItem.link, btn || document.createElement('button'));
      const saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
      const isSaved = saved.some(s => s.link === currentOpenItem.link);
      document.getElementById('readerSaveBtn').innerHTML = `<i class="${isSaved ? 'fas' : 'far'} fa-heart"></i>`;
    }

    function filterByTopic(topic, el) {
      document.querySelectorAll('.cat-link').forEach(c => c.classList.remove('active'));
      if (el) el.classList.add('active');
      activeList = topic === 'All' ? allNews : allNews.filter(n => n.topic === topic);
      
      if (topic === 'All') {
        renderHero(allNews.slice(0, 4));
        document.getElementById('heroSection').style.display = '';
        renderList(activeList.slice(4));
      } else {
        document.getElementById('heroSection').style.display = 'none';
        renderList(activeList);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function getTopic(t) {
      t = t.toLowerCase();
      if (t.includes('खेल') || t.includes('cricket') || t.includes('football')) return 'Sports';
      if (t.includes('राजनीति') || t.includes('election') || t.includes('सरकार')) return 'Politics';
      if (t.includes('प्रविधि') || t.includes('tech') || t.includes('gadget')) return 'Tech';
      if (t.includes('अर्थ') || t.includes('economy') || t.includes('बजेट')) return 'Economy';
      return 'General';
    }

    function topicLabel(t) {
      return { Sports:'खेलकुद', Politics:'राजनीति', Tech:'प्रविधि', Economy:'अर्थतन्त्र', General:'सामान्य' }[t] || t;
    }

    function renderSaved() {
      const saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
      activeList = saved;
      document.getElementById('heroSection').style.display = 'none';
      document.querySelectorAll('.cat-link').forEach(c => c.classList.remove('active'));
      renderList(saved);
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      document.getElementById('darkModeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }
  </script>
</body>
</html>
